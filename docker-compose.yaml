services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ekyc_db
      POSTGRES_USER: ekyc_user
      POSTGRES_PASSWORD: ekyc_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ekyc_user -d ekyc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ekyc_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_pass
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ekyc_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ekyc_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ekyc_net
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  ekyc_net:
    driver: bridge
